<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina - Social Learning Platform</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=Work+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0A0A0A;
            --secondary: #F5F5F5;
            --accent: #FF6B35;
            --text-primary: #0A0A0A;
            --text-secondary: #6B6B6B;
            --border: #E0E0E0;
            --hover-bg: #FAFAFA;
            --success: #00C853;
            --border-radius: var(--border-radius);
            --font-display: 'Syne', sans-serif;
            --font-body: 'Work Sans', sans-serif;
        }

        /* Dark Theme */
        [data-theme="dark"] {
            --primary: #FFFFFF;
            --secondary: #1A1A1A;
            --accent: #FF6B35;
            --text-primary: #FFFFFF;
            --text-secondary: #A0A0A0;
            --border: #2A2A2A;
            --hover-bg: #252525;
            --success: #00C853;
        }

        /* Blue Theme */
        [data-theme="blue"] {
            --primary: #0A0A0A;
            --secondary: #F0F4F8;
            --accent: #2563EB;
            --text-primary: #0A0A0A;
            --text-secondary: #6B6B6B;
            --border: #D1D5DB;
            --hover-bg: #E5E7EB;
            --success: #10B981;
        }

        /* Purple Theme */
        [data-theme="purple"] {
            --primary: #0A0A0A;
            --secondary: #FAF5FF;
            --accent: #9333EA;
            --text-primary: #0A0A0A;
            --text-secondary: #6B6B6B;
            --border: #E9D5FF;
            --hover-bg: #F3E8FF;
            --success: #10B981;
        }

        /* Green Theme */
        [data-theme="green"] {
            --primary: #0A0A0A;
            --secondary: #F0FDF4;
            --accent: #16A34A;
            --text-primary: #0A0A0A;
            --text-secondary: #6B6B6B;
            --border: #DCFCE7;
            --hover-bg: #F0FDF4;
            --success: #059669;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Work Sans', sans-serif;
            background: var(--secondary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        .app-container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: white;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo-dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        .nav-buttons {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--border-radius);
            font-family: 'Work Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(10, 10, 10, 0.15);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--hover-bg);
        }

        .btn-accent {
            background: var(--accent);
            color: white;
        }

        .btn-accent:hover {
            background: #ff5722;
            transform: translateY(-2px);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            padding: 3rem 2rem;
            display: grid;
            grid-template-columns: 280px 1fr 320px;
            gap: 3rem;
        }

        /* Sidebar */
        .sidebar {
            position: sticky;
            top: 120px;
            height: fit-content;
        }

        .sidebar-section {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border);
        }

        .sidebar-title {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: var(--hover-bg);
            border-radius: var(--border-radius);
            margin-bottom: 1rem;
        }

        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ff8a65);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .user-info h3 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .user-info p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            padding: 0.75rem 1rem;
            margin-bottom: 0.25rem;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .nav-item:hover {
            background: var(--hover-bg);
        }

        .nav-item.active {
            background: var(--primary);
            color: white;
        }

        /* Feed */
        .feed {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .create-post {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid var(--border);
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .create-post-header {
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .post-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .post-tab {
            padding: 0.75rem 1.5rem;
            background: none;
            border: none;
            font-family: 'Work Sans', sans-serif;
            font-size: 0.95rem;
            cursor: pointer;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all 0.3s;
        }

        .post-tab.active {
            color: var(--primary);
            border-bottom-color: var(--accent);
        }

        .post-input {
            width: 100%;
            padding: 1rem;
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            font-family: 'Work Sans', sans-serif;
            font-size: 0.95rem;
            resize: vertical;
            min-height: 100px;
            margin-bottom: 1rem;
            transition: border-color 0.3s;
        }

        .post-input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .file-upload {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .upload-btn {
            padding: 0.5rem 1rem;
            background: var(--hover-bg);
            border: 1px dashed var(--border);
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .upload-btn:hover {
            border-color: var(--accent);
            background: rgba(255, 107, 53, 0.1);
        }

        /* Post Card */
        .post-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            border: 1px solid var(--border);
            transition: all 0.3s;
            animation: fadeIn 0.5s ease-out backwards;
        }

        .post-card:nth-child(1) { animation-delay: 0.1s; }
        .post-card:nth-child(2) { animation-delay: 0.2s; }
        .post-card:nth-child(3) { animation-delay: 0.3s; }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .post-card:hover {
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .post-author {
            flex: 1;
        }

        .post-author h4 {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .post-author p {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .post-type {
            padding: 0.25rem 0.75rem;
            background: rgba(255, 107, 53, 0.1);
            color: var(--accent);
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .post-content {
            margin-bottom: 1.5rem;
            line-height: 1.7;
            color: var(--text-primary);
        }

        .post-content h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem;
            margin-bottom: 0.75rem;
        }

        .post-media {
            width: 100%;
            border-radius: var(--border-radius);
            margin-bottom: 1.5rem;
            overflow: hidden;
        }

        .post-media img, .post-media video {
            width: 100%;
            display: block;
        }

        .post-actions {
            display: flex;
            gap: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }

        .action-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
            transition: all 0.3s;
            padding: 0.5rem;
            border-radius: 6px;
        }

        .action-btn:hover {
            background: var(--hover-bg);
            color: var(--accent);
        }

        .action-btn.liked {
            color: var(--accent);
        }

        /* Right Sidebar */
        .trending {
            position: sticky;
            top: 120px;
            height: fit-content;
        }

        .trending-section {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        .trending-item {
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }

        .trending-item:last-child {
            border-bottom: none;
        }

        .trending-tag {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 0.25rem;
        }

        .trending-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.25rem;
        }

        .trending-stats {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        /* Auth Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            animation: fadeIn 0.3s;
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 3rem;
            max-width: 480px;
            width: 90%;
            animation: slideUp 0.3s;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-header {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            text-align: center;
        }

        .modal-subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .form-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 1px solid var(--border);
            border-radius: var(--border-radius);
            font-family: 'Work Sans', sans-serif;
            font-size: 0.95rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
        }

        .modal-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .link-btn {
            color: var(--accent);
            cursor: pointer;
            text-decoration: none;
            font-weight: 500;
        }

        .link-btn:hover {
            text-decoration: underline;
        }

        /* Settings Panel */
        .settings-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--hover-bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .settings-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
            transform: rotate(45deg);
        }

        .settings-btn:hover svg {
            fill: white;
        }

        .settings-btn svg {
            width: 20px;
            height: 20px;
            fill: var(--text-primary);
            transition: all 0.3s;
        }

        .settings-panel {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s;
        }

        .settings-section {
            margin-bottom: 2rem;
            padding-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .settings-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .settings-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: var(--text-primary);
        }

        .theme-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .theme-option {
            padding: 1rem;
            border: 2px solid var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            background: white;
        }

        .theme-option:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .theme-option.active {
            border-color: var(--accent);
            background: rgba(255, 107, 53, 0.05);
        }

        .theme-preview {
            width: 100%;
            height: 60px;
            border-radius: var(--border-radius);
            margin-bottom: 0.75rem;
            display: flex;
            gap: 4px;
            padding: 8px;
        }

        .theme-preview-bar {
            flex: 1;
            border-radius: 4px;
        }

        .theme-name {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .color-picker-group {
            margin-top: 1rem;
        }

        .color-picker-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem;
            border-radius: var(--border-radius);
            margin-bottom: 0.5rem;
            background: var(--hover-bg);
        }

        .color-picker-label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-primary);
        }

        .color-input {
            width: 60px;
            height: 40px;
            border: 2px solid var(--border);
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.3s;
        }

        .color-input:hover {
            border-color: var(--accent);
        }

        .radius-slider {
            width: 100%;
            margin-top: 1rem;
        }

        .slider-value {
            display: inline-block;
            margin-left: 1rem;
            padding: 0.25rem 0.75rem;
            background: var(--accent);
            color: white;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .reset-btn {
            width: 100%;
            margin-top: 1rem;
        }

        /* Welcome Screen */
        .welcome-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f5f5 0%, #ffffff 100%);
        }

        .welcome-content {
            text-align: center;
            max-width: 800px;
            padding: 2rem;
            animation: fadeIn 0.8s ease-out;
        }

        .welcome-title {
            font-family: 'Syne', sans-serif;
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .welcome-subtitle {
            font-size: 1.5rem;
            color: var(--text-secondary);
            margin-bottom: 3rem;
            font-weight: 300;
        }

        .welcome-features {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            margin-top: 4rem;
        }

        .feature-card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: all 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
        }

        .feature-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .feature-title {
            font-family: 'Syne', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .feature-description {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        @media (max-width: 1200px) {
            .main-content {
                grid-template-columns: 1fr;
            }
            
            .sidebar, .trending {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .welcome-title {
                font-size: 2.5rem;
            }
            
            .welcome-features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // API Configuration
        const API_URL = 'http://localhost:3001';
        
        // Helper function to get auth headers
        const getAuthHeaders = () => {
            const token = localStorage.getItem('auth_token');
            return {
                'Content-Type': 'application/json',
                ...(token && { 'Authorization': `Bearer ${token}` })
            };
        };

        // Mock database simulation
        const mockUsers = [
            { id: 1, name: 'Sarah Chen', email: 'sarah@example.com', bio: 'Design enthusiast & lifelong learner' },
            { id: 2, name: 'Alex Rivera', email: 'alex@example.com', bio: 'Tech educator & content creator' },
            { id: 3, name: 'Jordan Kim', email: 'jordan@example.com', bio: 'Philosophy student & writer' }
        ];

        const mockPosts = [
            {
                id: 1,
                author: mockUsers[0],
                type: 'Journal',
                title: 'Reflections on Creative Flow',
                content: 'Today I experienced one of those rare moments where time seemed to disappear. Working on my design project, I found myself completely immersed in the creative process. It made me realize that the best work happens when we stop overthinking and just create.',
                timestamp: '2 hours ago',
                likes: 24,
                comments: 8
            },
            {
                id: 2,
                author: mockUsers[1],
                type: 'Idea',
                title: 'The Future of Collaborative Learning',
                content: 'What if we reimagined education as a conversation rather than a lecture? Platforms like this prove that learning happens best when we share ideas, challenge each other respectfully, and build on collective knowledge. The classroom of tomorrow is everywhere.',
                timestamp: '5 hours ago',
                likes: 42,
                comments: 15
            },
            {
                id: 3,
                author: mockUsers[2],
                type: 'Journal',
                title: 'On the Value of Deep Reading',
                content: 'In an age of endless scrolling, I\'ve been experimenting with dedicating an hour each day to reading without distractions. The difference is remarkable - not just in comprehension, but in how the ideas linger and transform throughout the day.',
                timestamp: '1 day ago',
                likes: 67,
                comments: 23
            }
        ];

        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [authMode, setAuthMode] = useState('login');
            const [posts, setPosts] = useState(mockPosts);
            const [newPostType, setNewPostType] = useState('Journal');
            const [newPostTitle, setNewPostTitle] = useState('');
            const [newPostContent, setNewPostContent] = useState('');
            const [likedPosts, setLikedPosts] = useState(new Set());
            const [showSettings, setShowSettings] = useState(false);
            const [currentTheme, setCurrentTheme] = useState(
                localStorage.getItem('theme') || 'light'
            );
            const [customColors, setCustomColors] = useState({
                primary: localStorage.getItem('color-primary') || '#0A0A0A',
                accent: localStorage.getItem('color-accent') || '#FF6B35',
                secondary: localStorage.getItem('color-secondary') || '#F5F5F5'
            });
            const [borderRadius, setBorderRadius] = useState(
                parseInt(localStorage.getItem('border-radius')) || 8
            );

            // Apply theme on mount and when changed
            React.useEffect(() => {
                document.documentElement.setAttribute('data-theme', currentTheme);
                localStorage.setItem('theme', currentTheme);
            }, [currentTheme]);

            // Apply custom colors
            React.useEffect(() => {
                if (currentTheme === 'custom') {
                    document.documentElement.style.setProperty('--primary', customColors.primary);
                    document.documentElement.style.setProperty('--accent', customColors.accent);
                    document.documentElement.style.setProperty('--secondary', customColors.secondary);
                    localStorage.setItem('color-primary', customColors.primary);
                    localStorage.setItem('color-accent', customColors.accent);
                    localStorage.setItem('color-secondary', customColors.secondary);
                }
            }, [customColors, currentTheme]);

            // Apply border radius
            React.useEffect(() => {
                document.documentElement.style.setProperty('--border-radius', `${borderRadius}px`);
                localStorage.setItem('border-radius', borderRadius);
            }, [borderRadius]);

            const handleThemeChange = (theme) => {
                setCurrentTheme(theme);
            };

            const handleColorChange = (colorKey, value) => {
                setCustomColors(prev => ({
                    ...prev,
                    [colorKey]: value
                }));
            };

            const resetToDefaults = () => {
                setCurrentTheme('light');
                setCustomColors({
                    primary: '#0A0A0A',
                    accent: '#FF6B35',
                    secondary: '#F5F5F5'
                });
                setBorderRadius(8);
                localStorage.removeItem('theme');
                localStorage.removeItem('color-primary');
                localStorage.removeItem('color-accent');
                localStorage.removeItem('color-secondary');
                localStorage.removeItem('border-radius');
            };

            const handleAuth = (e) => {
                e.preventDefault();
                // Simulate login
                setCurrentUser(mockUsers[0]);
                setShowAuthModal(false);
            };

            const handleLogout = () => {
                setCurrentUser(null);
            };

            const handleCreatePost = () => {
                if (!newPostTitle || !newPostContent) return;
                
                const post = {
                    id: posts.length + 1,
                    author: currentUser,
                    type: newPostType,
                    title: newPostTitle,
                    content: newPostContent,
                    timestamp: 'Just now',
                    likes: 0,
                    comments: 0
                };
                
                setPosts([post, ...posts]);
                setNewPostTitle('');
                setNewPostContent('');
            };

            const toggleLike = (postId) => {
                setLikedPosts(prev => {
                    const newSet = new Set(prev);
                    if (newSet.has(postId)) {
                        newSet.delete(postId);
                    } else {
                        newSet.add(postId);
                    }
                    return newSet;
                });
            };

            if (!currentUser) {
                return (
                    <>
                        <div className="welcome-screen">
                            <div className="welcome-content">
                                <h1 className="welcome-title">Lumina</h1>
                                <p className="welcome-subtitle">
                                    Where ideas flourish and connections deepen
                                </p>
                                <div style={{ display: 'flex', gap: '1rem', justifyContent: 'center', marginTop: '2rem' }}>
                                    <button className="btn btn-primary" onClick={() => { setAuthMode('signup'); setShowAuthModal(true); }}>
                                        Get Started
                                    </button>
                                    <button className="btn btn-secondary" onClick={() => { setAuthMode('login'); setShowAuthModal(true); }}>
                                        Sign In
                                    </button>
                                </div>

                                <div className="welcome-features">
                                    <div className="feature-card">
                                        <div className="feature-icon">📝</div>
                                        <h3 className="feature-title">Share Your Journey</h3>
                                        <p className="feature-description">Post videos, journals, and ideas that matter to you</p>
                                    </div>
                                    <div className="feature-card">
                                        <div className="feature-icon">💡</div>
                                        <h3 className="feature-title">Learn Together</h3>
                                        <p className="feature-description">Engage with thoughtful content from curious minds</p>
                                    </div>
                                    <div className="feature-card">
                                        <div className="feature-icon">🤝</div>
                                        <h3 className="feature-title">Build Connections</h3>
                                        <p className="feature-description">Form meaningful relationships through shared interests</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {showAuthModal && (
                            <div className="modal-overlay" onClick={() => setShowAuthModal(false)}>
                                <div className="modal" onClick={(e) => e.stopPropagation()}>
                                    <h2 className="modal-header">
                                        {authMode === 'login' ? 'Welcome Back' : 'Join Lumina'}
                                    </h2>
                                    <p className="modal-subtitle">
                                        {authMode === 'login' 
                                            ? 'Sign in to continue your journey' 
                                            : 'Start sharing and learning today'}
                                    </p>
                                    
                                    <form onSubmit={handleAuth}>
                                        {authMode === 'signup' && (
                                            <div className="form-group">
                                                <label className="form-label">Full Name</label>
                                                <input type="text" className="form-input" placeholder="Enter your name" required />
                                            </div>
                                        )}
                                        
                                        <div className="form-group">
                                            <label className="form-label">Email</label>
                                            <input type="email" className="form-input" placeholder="you@example.com" required />
                                        </div>
                                        
                                        <div className="form-group">
                                            <label className="form-label">Password</label>
                                            <input type="password" className="form-input" placeholder="••••••••" required />
                                        </div>

                                        <button type="submit" className="btn btn-primary" style={{ width: '100%', marginTop: '1rem' }}>
                                            {authMode === 'login' ? 'Sign In' : 'Create Account'}
                                        </button>
                                    </form>

                                    <p className="modal-footer">
                                        {authMode === 'login' ? "Don't have an account? " : "Already have an account? "}
                                        <span className="link-btn" onClick={() => setAuthMode(authMode === 'login' ? 'signup' : 'login')}>
                                            {authMode === 'login' ? 'Sign Up' : 'Sign In'}
                                        </span>
                                    </p>
                                </div>
                            </div>
                        )}
                    </>
                );
            }

            return (
                <div className="app-container">
                    <header className="header">
                        <div className="header-content">
                            <div className="logo">
                                <span className="logo-dot"></span>
                                Lumina
                            </div>
                            <div className="nav-buttons">
                                <button className="settings-btn" onClick={() => setShowSettings(true)} title="Customize Appearance">
                                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
                                    </svg>
                                </button>
                                <button className="btn btn-secondary" onClick={handleLogout}>Sign Out</button>
                            </div>
                        </div>
                    </header>

                    <main className="main-content">
                        {/* Left Sidebar */}
                        <aside className="sidebar">
                            <div className="sidebar-section">
                                <div className="user-profile">
                                    <div className="avatar">{currentUser.name[0]}</div>
                                    <div className="user-info">
                                        <h3>{currentUser.name}</h3>
                                        <p>{currentUser.bio}</p>
                                    </div>
                                </div>
                            </div>

                            <div className="sidebar-section">
                                <h3 className="sidebar-title">Navigation</h3>
                                <ul className="nav-menu">
                                    <li className="nav-item active">🏠 Home Feed</li>
                                    <li className="nav-item">🔥 Trending</li>
                                    <li className="nav-item">👥 Following</li>
                                    <li className="nav-item">📚 My Posts</li>
                                    <li className="nav-item">⚙️ Settings</li>
                                </ul>
                            </div>
                        </aside>

                        {/* Main Feed */}
                        <div className="feed">
                            {/* Create Post */}
                            <div className="create-post">
                                <h2 className="create-post-header">Share Your Thoughts</h2>
                                
                                <div className="post-tabs">
                                    <button 
                                        className={`post-tab ${newPostType === 'Journal' ? 'active' : ''}`}
                                        onClick={() => setNewPostType('Journal')}
                                    >
                                        📝 Journal
                                    </button>
                                    <button 
                                        className={`post-tab ${newPostType === 'Idea' ? 'active' : ''}`}
                                        onClick={() => setNewPostType('Idea')}
                                    >
                                        💡 Idea
                                    </button>
                                    <button 
                                        className={`post-tab ${newPostType === 'Video' ? 'active' : ''}`}
                                        onClick={() => setNewPostType('Video')}
                                    >
                                        🎥 Video
                                    </button>
                                </div>

                                <input 
                                    type="text" 
                                    className="post-input" 
                                    placeholder="Give your post a title..."
                                    value={newPostTitle}
                                    onChange={(e) => setNewPostTitle(e.target.value)}
                                    style={{ minHeight: 'auto', marginBottom: '1rem' }}
                                />
                                
                                <textarea 
                                    className="post-input" 
                                    placeholder="What's on your mind?"
                                    value={newPostContent}
                                    onChange={(e) => setNewPostContent(e.target.value)}
                                />

                                {newPostType === 'Video' && (
                                    <div className="file-upload">
                                        <label className="upload-btn">
                                            📎 Attach Video
                                            <input type="file" accept="video/*" style={{ display: 'none' }} />
                                        </label>
                                    </div>
                                )}

                                <button className="btn btn-accent" onClick={handleCreatePost}>
                                    Publish
                                </button>
                            </div>

                            {/* Posts */}
                            {posts.map(post => (
                                <div key={post.id} className="post-card">
                                    <div className="post-header">
                                        <div className="avatar">{post.author.name[0]}</div>
                                        <div className="post-author">
                                            <h4>{post.author.name}</h4>
                                            <p>{post.timestamp}</p>
                                        </div>
                                        <span className="post-type">{post.type}</span>
                                    </div>

                                    <div className="post-content">
                                        <h3>{post.title}</h3>
                                        <p>{post.content}</p>
                                    </div>

                                    <div className="post-actions">
                                        <button 
                                            className={`action-btn ${likedPosts.has(post.id) ? 'liked' : ''}`}
                                            onClick={() => toggleLike(post.id)}
                                        >
                                            {likedPosts.has(post.id) ? '❤️' : '🤍'} {post.likes + (likedPosts.has(post.id) ? 1 : 0)}
                                        </button>
                                        <button className="action-btn">
                                            💬 {post.comments}
                                        </button>
                                        <button className="action-btn">
                                            🔄 Share
                                        </button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* Right Sidebar */}
                        <aside className="trending">
                            <div className="trending-section">
                                <h3 className="sidebar-title">Trending Topics</h3>
                                {[
                                    { tag: '#Learning', title: 'Self-Directed Education', posts: '234 posts' },
                                    { tag: '#Tech', title: 'AI & Creativity', posts: '189 posts' },
                                    { tag: '#Philosophy', title: 'Stoic Practices', posts: '156 posts' },
                                    { tag: '#Wellness', title: 'Mindful Living', posts: '142 posts' }
                                ].map((item, i) => (
                                    <div key={i} className="trending-item">
                                        <div className="trending-tag">{item.tag}</div>
                                        <div className="trending-title">{item.title}</div>
                                        <div className="trending-stats">{item.posts}</div>
                                    </div>
                                ))}
                            </div>

                            <div className="trending-section">
                                <h3 className="sidebar-title">Suggested Users</h3>
                                {mockUsers.slice(1).map(user => (
                                    <div key={user.id} className="user-profile" style={{ marginBottom: '1rem' }}>
                                        <div className="avatar" style={{ width: '40px', height: '40px', fontSize: '1rem' }}>
                                            {user.name[0]}
                                        </div>
                                        <div className="user-info">
                                            <h3 style={{ fontSize: '0.9rem' }}>{user.name}</h3>
                                            <p style={{ fontSize: '0.8rem' }}>{user.bio}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </aside>
                    </main>

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="modal-overlay" onClick={() => setShowSettings(false)}>
                            <div className="settings-panel" onClick={(e) => e.stopPropagation()}>
                                <h2 className="modal-header">Customize Your Style</h2>
                                <p className="modal-subtitle">Make Lumina truly yours</p>

                                {/* Theme Selection */}
                                <div className="settings-section">
                                    <div className="settings-title">Choose a Theme</div>
                                    <div className="theme-grid">
                                        <div 
                                            className={`theme-option ${currentTheme === 'light' ? 'active' : ''}`}
                                            onClick={() => handleThemeChange('light')}
                                        >
                                            <div className="theme-preview" style={{background: '#F5F5F5'}}>
                                                <div className="theme-preview-bar" style={{background: '#0A0A0A'}}></div>
                                                <div className="theme-preview-bar" style={{background: '#FF6B35'}}></div>
                                                <div className="theme-preview-bar" style={{background: '#E0E0E0'}}></div>
                                            </div>
                                            <div className="theme-name">Light</div>
                                        </div>

                                        <div 
                                            className={`theme-option ${currentTheme === 'dark' ? 'active' : ''}`}
                                            onClick={() => handleThemeChange('dark')}
                                        >
                                            <div className="theme-preview" style={{background: '#1A1A1A'}}>
                                                <div className="theme-preview-bar" style={{background: '#FFFFFF'}}></div>
                                                <div className="theme-preview-bar" style={{background: '#FF6B35'}}></div>
                                                <div className="theme-preview-bar" style={{background: '#2A2A2A'}}></div>
                                            </div>
                                            <div className="theme-name">Dark</div>
                                        </div>

                                        <div 
                                            className={`theme-option ${currentTheme === 'blue' ? 'active' : ''}`}
                                            onClick={() => handleThemeChange('blue')}
                                        >
                                            <div className="theme-preview" style={{background: '#F0F4F8'}}>
                                                <div className="theme-preview-bar" style={{background: '#0A0A0A'}}></div>
                                                <div className="theme-preview-bar" style={{background: '#2563EB'}}></div>
                                                <div className="theme-preview-bar" style={{background: '#D1D5DB'}}></div>
                                            </div>
                                            <div className="theme-name">Ocean</div>
                                        </div>

                                        <div 
                                            className={`theme-option ${currentTheme === 'purple' ? 'active' : ''}`}
                                            onClick={() => handleThemeChange('purple')}
                                        >
                                            <div className="theme-preview" style={{background: '#FAF5FF'}}>
                                                <div className="theme-preview-bar" style={{background: '#0A0A0A'}}></div>
                                                <div className="theme-preview-bar" style={{background: '#9333EA'}}></div>
                                                <div className="theme-preview-bar" style={{background: '#E9D5FF'}}></div>
                                            </div>
                                            <div className="theme-name">Purple</div>
                                        </div>

                                        <div 
                                            className={`theme-option ${currentTheme === 'green' ? 'active' : ''}`}
                                            onClick={() => handleThemeChange('green')}
                                        >
                                            <div className="theme-preview" style={{background: '#F0FDF4'}}>
                                                <div className="theme-preview-bar" style={{background: '#0A0A0A'}}></div>
                                                <div className="theme-preview-bar" style={{background: '#16A34A'}}></div>
                                                <div className="theme-preview-bar" style={{background: '#DCFCE7'}}></div>
                                            </div>
                                            <div className="theme-name">Nature</div>
                                        </div>

                                        <div 
                                            className={`theme-option ${currentTheme === 'custom' ? 'active' : ''}`}
                                            onClick={() => handleThemeChange('custom')}
                                        >
                                            <div className="theme-preview" style={{background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'}}>
                                                <div className="theme-preview-bar" style={{background: 'rgba(255,255,255,0.9)'}}></div>
                                                <div className="theme-preview-bar" style={{background: 'rgba(255,255,255,0.7)'}}></div>
                                                <div className="theme-preview-bar" style={{background: 'rgba(255,255,255,0.5)'}}></div>
                                            </div>
                                            <div className="theme-name">Custom</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Custom Colors */}
                                {currentTheme === 'custom' && (
                                    <div className="settings-section">
                                        <div className="settings-title">Custom Colors</div>
                                        <div className="color-picker-group">
                                            <div className="color-picker-item">
                                                <span className="color-picker-label">Primary Color</span>
                                                <input 
                                                    type="color" 
                                                    className="color-input"
                                                    value={customColors.primary}
                                                    onChange={(e) => handleColorChange('primary', e.target.value)}
                                                />
                                            </div>
                                            <div className="color-picker-item">
                                                <span className="color-picker-label">Accent Color</span>
                                                <input 
                                                    type="color" 
                                                    className="color-input"
                                                    value={customColors.accent}
                                                    onChange={(e) => handleColorChange('accent', e.target.value)}
                                                />
                                            </div>
                                            <div className="color-picker-item">
                                                <span className="color-picker-label">Background Color</span>
                                                <input 
                                                    type="color" 
                                                    className="color-input"
                                                    value={customColors.secondary}
                                                    onChange={(e) => handleColorChange('secondary', e.target.value)}
                                                />
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* Border Radius */}
                                <div className="settings-section">
                                    <div className="settings-title">
                                        Border Roundness
                                        <span className="slider-value">{borderRadius}px</span>
                                    </div>
                                    <input 
                                        type="range" 
                                        className="radius-slider"
                                        min="0" 
                                        max="24" 
                                        step="2"
                                        value={borderRadius}
                                        onChange={(e) => setBorderRadius(parseInt(e.target.value))}
                                    />
                                </div>

                                {/* Reset Button */}
                                <button className="btn btn-secondary reset-btn" onClick={resetToDefaults}>
                                    Reset to Defaults
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
